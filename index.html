<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PB Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:#f0f2f5;min-height:100vh;display:flex;justify-content:center;padding:20px}
.app{max-width:500px;width:100%}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
h2{font-size:18px;margin-bottom:12px}
input,button{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:8px}
button{background:#1a5f4a;color:#fff;border:none;font-weight:600;cursor:pointer}
.gray{background:#6b7280}.red{background:#dc2626;width:auto;padding:4px 12px;font-size:12px}
.err{color:#dc2626;font-size:13px;display:none;margin-bottom:8px}
.b1{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;margin-left:6px;background:#fef3c7;color:#92400e}
.b2{background:#dcfce7;color:#166534}.b3{background:#f3f4f6;color:#6b7280}
.bg{background:#dcfce7;color:#166534;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:600}
.bgg{background:#f3f4f6;color:#6b7280;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:600}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0}
pre{background:#1a1a2e;color:#4ade80;padding:10px;border-radius:8px;font-size:11px;max-height:120px;overflow-y:auto;margin-top:8px}
</style>
</head>
<body>
<div class="app">
<div class="card" style="text-align:center"><h1>🔐 PB Demo</h1></div>

<div class="card" id="login-card">
  <h2>Login</h2>
  <p class="err" id="le"></p>
  <input id="em" value="maria.gonzalez@colegiomontessori.cl">
  <input id="pw" type="password" value="12345678">
  <button onclick="login()">Ingresar</button>
</div>

<div id="app-card" style="display:none">
  <div class="card">
    <h2>👤 <span id="nm"></span></h2>
    <p><span id="bd"></span></p>
    <p style="font-size:13px;color:#666" id="ui"></p>
    <button class="gray" onclick="logout()" style="margin-top:12px">Salir</button>
  </div>
  <div class="card">
    <h2>Crear</h2>
    <input id="it" placeholder="Título">
    <button onclick="create()">➕ Crear</button>
  </div>
  <div class="card">
    <h2>Items (<span id="ct">0</span>)</h2>
    <p class="err" id="ie"></p>
    <div id="il"></div>
  </div>
  <pre id="db">Debug log...</pre>
</div>
</div>

<script>
let token = '';
const log = (s) => { document.getElementById('db').textContent += s + '\n'; console.log(s); };

async function api(path, opts={}) {
  const h = opts.headers || {};
  if (token) h['Authorization'] = 'Bearer ' + token;
  const r = await fetch(path, { ...opts, headers: { 'Content-Type': 'application/json', ...h } });
  return r.json();
}

async function login() {
  const le = document.getElementById('le'); le.style.display = 'none';
  log('Login...');
  try {
    const d = await api('/api/collections/profiles/auth-with-password', {
      method: 'POST',
      body: JSON.stringify({ identity: document.getElementById('em').value, password: document.getElementById('pw').value })
    });
    if (d.token) {
      token = d.token;
      log('✅ Auth OK: ' + d.record.nombre);
      document.getElementById('login-card').style.display = 'none';
      document.getElementById('app-card').style.display = 'block';
      document.getElementById('nm').textContent = d.record.nombre;
      document.getElementById('ui').textContent = d.record.cargo + ' · ' + d.record.email;
      document.getElementById('bd').innerHTML = d.record.esMiembroBienestar
        ? '<span class="bg">✓ Miembro Bienestar</span>'
        : '<span class="bgg">No es miembro</span>';
      loadItems();
    } else {
      log('❌ Auth fail: ' + JSON.stringify(d));
      le.textContent = d.message || 'Error'; le.style.display = 'block';
    }
  } catch(x) { log('❌ Auth err: ' + x.message); le.textContent = x.message; le.style.display = 'block'; }
}

async function loadItems() {
  log('Loading items...');
  const ie = document.getElementById('ie'); ie.style.display = 'none';
  try {
    const d = await api('/api/collections/items/records?perPage=50&sort=-created');
    log('✅ Items: ' + d.totalItems);
    document.getElementById('ct').textContent = d.totalItems || 0;
    document.getElementById('il').innerHTML = d.items?.length
      ? d.items.map(i => `<div class="row"><div><strong>${e(i.title)}</strong><span class="b${i.status==='done'?'2':i.status==='archived'?'3':'1'}">${i.status}</span></div><button class="red" onclick="del('${i.id}')">✕</button></div>`).join('')
      : '<p style="color:#888">No items</p>';
  } catch(x) {
    log('❌ Items err: ' + x.message);
    ie.textContent = x.message; ie.style.display = 'block';
  }
}

async function create() {
  const t = document.getElementById('it').value;
  if (!t) return;
  log('Create: ' + t);
  await api('/api/collections/items/records', { method:'POST', body: JSON.stringify({title:t,description:'',status:'pending'}) });
  document.getElementById('it').value = '';
  loadItems();
}

async function del(id) {
  log('Delete: ' + id);
  await api('/api/collections/items/records/' + id, { method:'DELETE' });
  loadItems();
}

function logout() { token=''; document.getElementById('login-card').style.display='block'; document.getElementById('app-card').style.display='none'; }
function e(s) { return (s||'').replace(/</g,'&lt;'); }
</script>
</body>
</html>
