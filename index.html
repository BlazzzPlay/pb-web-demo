<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PocketBase Demo — Bienestar Montessori</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:#f0f2f5;min-height:100vh;display:flex;justify-content:center;padding:20px}
.app{max-width:500px;width:100%}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
h2{font-size:18px;margin-bottom:12px}
input,button{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:8px}
button{background:#1a5f4a;color:#fff;border:none;font-weight:600;cursor:pointer}
button.gray{background:#6b7280}
button.red{background:#dc2626;width:auto;padding:4px 12px;font-size:12px}
.error{color:#dc2626;font-size:13px;display:none}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;margin-left:6px}
.b1{background:#fef3c7;color:#92400e}.b2{background:#dcfce7;color:#166534}.b3{background:#f3f4f6;color:#6b7280}
.bg{background:#dcfce7;color:#166534}.bgg{background:#f3f4f6;color:#6b7280}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0}
.tabs{display:flex;gap:4px;margin-bottom:16px}
.tab{padding:8px 16px;background:#e5e7eb;border:none;border-radius:8px;cursor:pointer;font-size:13px}
.tab.on{background:#1a5f4a;color:#fff}
.panel{display:none}.panel.on{display:block}
.rt{background:#1a1a2e;color:#4ade80;border-radius:8px;padding:12px;font-family:monospace;font-size:12px;max-height:150px;overflow-y:auto}
</style>
</head>
<body>
<div class="app">

<div class="card" style="text-align:center">
  <h1 style="font-size:24px">🔐 PocketBase Demo</h1>
  <p style="color:#666;font-size:14px">Auth · CRUD · Realtime — mismo dominio, cero CORS</p>
</div>

<div class="card" id="login-card">
  <h2>Iniciar Sesión</h2>
  <p class="error" id="lerr"></p>
  <input id="lemail" placeholder="Email" value="maria.gonzalez@colegiomontessori.cl">
  <input id="lpass" type="password" placeholder="Contraseña" value="12345678">
  <button onclick="login()">Ingresar</button>
</div>

<div id="app-card" style="display:none">
  <div class="card">
    <h2>👤 <span id="uname"></span></h2>
    <p><span id="ubadge"></span></p>
    <p style="font-size:13px;color:#666" id="uinfo"></p>
    <button class="gray" onclick="logout()" style="margin-top:12px">Cerrar Sesión</button>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="tab('items')">📋 Items CRUD</button>
    <button class="tab" onclick="tab('realtime')">⚡ Realtime</button>
  </div>

  <div class="panel on" id="panel-items">
    <div class="card">
      <h2>Crear Item</h2>
      <input id="ititle" placeholder="Título">
      <button onclick="createItem()">➕ Crear</button>
    </div>
    <div class="card">
      <h2>Items (<span id="icount">0</span>)</h2>
      <p class="error" id="ierr"></p>
      <div id="ilist">Cargando...</div>
    </div>
  </div>

  <div class="panel" id="panel-realtime">
    <div class="card">
      <h2>⚡ Eventos en Tiempo Real</h2>
      <p style="font-size:13px;color:#666">Creá items y mirá los eventos:</p>
      <div class="rt" id="rtlog">Conectando...</div>
    </div>
  </div>
</div>

</div>

<script>
const API = window.location.origin.replace('5173','').replace(':4173','');

let token = '';
let evtSource = null;

async function api(path, opts={}) {
  const h = opts.headers || {};
  if (token) h['Authorization'] = 'Bearer ' + token;
  const r = await fetch(path, { ...opts, headers: { 'Content-Type': 'application/json', ...h } });
  return r.json();
}

async function login() {
  const e = document.getElementById('lerr'); e.style.display = 'none';
  const d = await api('/api/collections/profiles/auth-with-password', {
    method: 'POST',
    body: JSON.stringify({ identity: document.getElementById('lemail').value, password: document.getElementById('lpass').value })
  });
  if (d.token) {
    token = d.token;
    document.getElementById('login-card').style.display = 'none';
    document.getElementById('app-card').style.display = 'block';
    document.getElementById('uname').textContent = d.record.nombre;
    document.getElementById('uinfo').textContent = d.record.cargo + ' · ' + d.record.email;
    document.getElementById('ubadge').innerHTML = d.record.esMiembroBienestar
      ? '<span class="bg">✓ Miembro Bienestar</span>'
      : '<span class="bgg">No es miembro</span>';
    loadItems();
    startRT();
  } else { e.textContent = d.message || 'Error'; e.style.display = 'block'; }
}

function logout() {
  token = ''; evtSource?.close(); evtSource = null;
  document.getElementById('login-card').style.display = 'block';
  document.getElementById('app-card').style.display = 'none';
}

async function loadItems() {
  const d = await api('/api/collections/items/records?perPage=50&sort=-created');
  document.getElementById('icount').textContent = d.totalItems || 0;
  document.getElementById('ilist').innerHTML = d.items?.length
    ? d.items.map(i => `<div class="row"><div><strong>${e(i.title)}</strong><span class="${i.status==='done'?'b2':i.status==='archived'?'b3':'b1'}">${i.status}</span></div><button class="red" onclick="del('${i.id}')">✕</button></div>`).join('')
    : '<p style="color:#888">No hay items. ¡Creá el primero!</p>';
}

async function createItem() {
  const t = document.getElementById('ititle').value;
  if (!t) return;
  await api('/api/collections/items/records', { method: 'POST', body: JSON.stringify({ title: t, description: '', status: 'pending' }) });
  document.getElementById('ititle').value = '';
  loadItems();
}

async function del(id) {
  await api('/api/collections/items/records/' + id, { method: 'DELETE' });
  loadItems();
}

function startRT() {
  evtSource?.close();
  const log = document.getElementById('rtlog');
  evtSource = new EventSource('/api/realtime');
  evtSource.addEventListener('PB_CONNECT', () => { log.innerHTML = '✅ Conectado\n' + log.innerHTML; });
  evtSource.addEventListener('items/*', (e) => {
    try {
      const d = JSON.parse(e.data);
      const t = new Date().toLocaleTimeString();
      log.innerHTML = `${t} — <b>${d.action}</b>: ${d.record?.title||'?'}\n` + log.innerHTML;
    } catch {}
  });
}

function tab(name) {
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('on', b.textContent.includes(name)));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('on', p.id === 'panel-' + name));
  if (name === 'items') loadItems();
}

function e(s) { return (s||'').replace(/</g,'&lt;'); }
</script>
</body>
</html>
